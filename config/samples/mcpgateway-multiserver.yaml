apiVersion: mcp.kagenti.com/v1alpha1
kind: MCPGateway
metadata:
  name: ai-assistant-tools
  namespace: mcp-system
spec:
  # Multiple HTTPRoute references for different MCP servers
  targetRefs:
  # Weather service with explicit prefix
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: weather-route
    namespace: mcp-system
    toolPrefix: weather_
  
  # Calendar service in same namespace  
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: calendar-route
    toolPrefix: cal_
  
  # Search service from another namespace
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: search-route
    namespace: search-system
    toolPrefix: search_
  
  # Knowledge base service - uses default prefix
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: knowledge-route
    namespace: kb-system
    # No toolPrefix - will use spec-level default
  
  # Another service without explicit prefix
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: docs-route
    # No namespace - defaults to mcp-system
    # No toolPrefix - will use spec-level default
  
  # Default prefix for targetRefs without explicit toolPrefix
  toolPrefix: ai_
